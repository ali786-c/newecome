kind = "web"
previewPath = "/"
title = "UpgraderCX Frontend"
version = "1.0.0"
id = "artifacts/upgradercx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22837
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/upgradercx run dev"

[services.env]
PORT = "22837"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/upgradercx", "run", "build"]
publicDir = "artifacts/upgradercx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
